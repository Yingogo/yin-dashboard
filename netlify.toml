[build]
  command = "node -e \"console.log('No build step required')\""
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/market"
  to = "/.netlify/functions/api?route=market"
  status = 200

[[redirects]]
  from = "/api/context"
  to = "/.netlify/functions/api?route=context"
  status = 200

[[redirects]]
  from = "/api/history"
  to = "/.netlify/functions/api?route=history"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
